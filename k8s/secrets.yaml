# NOTE: In real production, use a secrets manager (Vault, AWS Secrets Manager, etc.)
# and never commit real credentials to source control.
# stringData values are plain text — Kubernetes base64-encodes them automatically.
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: customer-support
type: Opaque
stringData:
  db-password: "Strong@Password123"
  rabbitmq-user: "appuser"
  rabbitmq-pass: "apppass"
  identity-connection-string: "Server=sqlserver;Database=UserServiceDb;User Id=sa;Password=Strong@Password123;TrustServerCertificate=True"
  ticket-connection-string: "Server=sqlserver;Database=TicketServiceDb;User Id=sa;Password=Strong@Password123;TrustServerCertificate=True"
  support-connection-string: "Server=sqlserver;Database=SupportServiceDb;User Id=sa;Password=Strong@Password123;TrustServerCertificate=True"
  notification-connection-string: "Server=sqlserver;Database=NotificationServiceDb;User Id=sa;Password=Strong@Password123;TrustServerCertificate=True"
